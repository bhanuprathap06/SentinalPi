<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>SentinelPi Live Feed</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

:root{
  --bg:#0B0C10;
  --surface:rgba(255,255,255,0.05);
  --border:rgba(255,255,255,0.08);
  --text:#C5C6C7;
  --bright:#fff;
  --muted:#666;
  --cyan:#45F3FF;
  --green:#4caf50;
  --red:#f44336;
  --orange:#FF8C00;
  --yellow:#ffca28;
  --purple:#ab47bc;
  --safe-glow:0 0 12px rgba(69,243,255,0.25);
  --danger-glow:0 0 18px rgba(244,67,54,0.5);
}

body{
  background:var(--bg);
  color:var(--text);
  font-family:'Segoe UI',Roboto,Helvetica,Arial,sans-serif;
  min-height:100vh;
  display:flex;
  flex-direction:column;
  gap:0;
}

/* ── HEADER ── */
header{
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:12px 20px;
  background:rgba(255,255,255,0.03);
  border-bottom:1px solid var(--border);
  backdrop-filter:blur(8px);
  position:sticky;top:0;z-index:10;
}
.logo{
  display:flex;align-items:center;gap:10px;
}
.logo svg{width:22px;height:22px;flex-shrink:0}
header h1{
  font-size:1.05rem;font-weight:700;
  letter-spacing:1.5px;color:var(--cyan);
  text-transform:uppercase;
}
.conn{display:flex;align-items:center;gap:6px}
#conn-dot{
  width:8px;height:8px;border-radius:50%;
  background:var(--muted);transition:background .3s;
  box-shadow:0 0 0 0 transparent;
}
#conn-dot.live{
  background:var(--cyan);
  box-shadow:0 0 6px var(--cyan);
  animation:pulse-dot 2s ease-in-out infinite;
}
#conn-dot.dead{background:var(--red);}
#conn-label{font-size:.72rem;color:var(--muted);transition:color .3s;letter-spacing:.5px}

@keyframes pulse-dot{
  0%,100%{box-shadow:0 0 4px var(--cyan)}
  50%{box-shadow:0 0 10px var(--cyan)}
}

/* ── BANNER ── */
#banner{
  display:none;padding:9px 20px;
  font-size:.82rem;font-weight:700;
  text-align:center;letter-spacing:.8px;
}
#banner.alarm{
  display:block;background:rgba(244,67,54,0.15);
  color:var(--red);border-top:1px solid var(--red);
  border-bottom:1px solid var(--red);
  animation:flash-banner .6s step-start infinite;
}
#banner.error{
  display:block;background:rgba(255,202,40,0.08);
  color:var(--yellow);border-bottom:1px solid rgba(255,202,40,0.3);
}
@keyframes flash-banner{
  0%,100%{opacity:1}50%{opacity:.3}
}

/* ── GRID ── */
main{
  flex:1;
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(190px,1fr));
  gap:14px;padding:16px 20px;
}

/* ── CARDS (Glassmorphism) ── */
.card{
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:14px;
  padding:18px 16px 14px;
  display:flex;flex-direction:column;align-items:center;gap:10px;
  backdrop-filter:blur(10px);
  box-shadow:var(--safe-glow);
  transition:box-shadow .4s,border-color .4s;
  position:relative;overflow:hidden;
}
/* subtle shimmer line */
.card::before{
  content:'';position:absolute;top:0;left:0;right:0;height:1px;
  background:linear-gradient(90deg,transparent,var(--cyan),transparent);
  opacity:.4;
}
.card .icon{color:var(--muted);margin-bottom:2px}
.card .label{
  font-size:.6rem;letter-spacing:2px;
  text-transform:uppercase;color:var(--muted);
}
.card .unit{font-size:.7rem;color:var(--muted)}

/* alarm card style */
body.alarm .card{
  border-color:rgba(244,67,54,0.5);
  box-shadow:var(--danger-glow);
  animation:card-flash .7s step-start infinite;
}
body.alarm .card::before{
  background:linear-gradient(90deg,transparent,var(--red),transparent);
  opacity:.6;
}
@keyframes card-flash{
  0%,100%{box-shadow:0 0 18px rgba(244,67,54,.5)}
  50%{box-shadow:0 0 4px rgba(244,67,54,.1)}
}

/* ── RING ── */
.ring-wrap{position:relative;width:90px;height:90px}
.ring-wrap svg{width:90px;height:90px;transform:rotate(-90deg)}
.ring-bg{fill:none;stroke:rgba(255,255,255,0.07);stroke-width:6}
.ring-fill{fill:none;stroke-width:6;stroke-linecap:round;
  transition:stroke-dashoffset .6s ease,stroke .4s}
.ring-label{
  position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);
  text-align:center;line-height:1.1;
}
.ring-val{font-size:1.3rem;font-weight:700;color:var(--bright)}
.ring-unit{font-size:.55rem;color:var(--muted)}

/* Motion big text */
.motion-val{
  font-size:1.4rem;font-weight:700;
  letter-spacing:1px;color:var(--green);
  transition:color .3s;
}
body.alarm .motion-val{color:var(--red)}

/* ── CHART SECTION ── */
.chart-wrap{
  margin:0 20px 20px;
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:14px;
  padding:16px;
  backdrop-filter:blur(10px);
  box-shadow:var(--safe-glow);
  transition:box-shadow .4s,border-color .4s;
}
body.alarm .chart-wrap{
  border-color:rgba(244,67,54,.4);
  box-shadow:var(--danger-glow);
}
.chart-title{
  font-size:.65rem;letter-spacing:2px;
  text-transform:uppercase;color:var(--muted);
  margin-bottom:10px;
}
.chart-canvas-wrap{height:160px;position:relative}

/* ── FOOTER ── */
footer{
  padding:8px 20px;font-size:.65rem;color:var(--muted);
  text-align:right;border-top:1px solid var(--border);
}
</style>
</head>
<body>

<header>
  <div class="logo">
    <!-- shield SVG icon -->
    <svg viewBox="0 0 24 24" fill="none" stroke="#45F3FF" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
      <path d="M12 2L3 7v5c0 5.25 3.75 10.15 9 11.25C17.25 22.15 21 17.25 21 12V7L12 2z"/>
    </svg>
    <h1>SentinelPi Live Feed</h1>
  </div>
  <div class="conn">
    <span id="conn-dot"></span>
    <span id="conn-label">CONNECTING</span>
  </div>
</header>

<div id="banner"></div>

<main>
  <!-- Temperature -->
  <div class="card" id="card-temp">
    <div class="icon">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#45F3FF" stroke-width="1.8" stroke-linecap="round">
        <path d="M14 14.76V4a2 2 0 0 0-4 0v10.76a4 4 0 1 0 4 0z"/>
      </svg>
    </div>
    <div class="label">Temperature</div>
    <div class="ring-wrap">
      <svg viewBox="0 0 90 90">
        <circle class="ring-bg" cx="45" cy="45" r="38"/>
        <circle class="ring-fill" id="ring-temp" cx="45" cy="45" r="38"
          stroke="#45F3FF"
          stroke-dasharray="238.76"
          stroke-dashoffset="238.76"/>
      </svg>
      <div class="ring-label">
        <div class="ring-val" id="val-temp">--</div>
        <div class="ring-unit">°C</div>
      </div>
    </div>
  </div>

  <!-- Humidity -->
  <div class="card" id="card-hum">
    <div class="icon">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#4caf50" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
        <path d="M12 2C6.48 2 2 7.5 2 12a10 10 0 0 0 20 0C22 7.5 17.52 2 12 2z"/>
      </svg>
    </div>
    <div class="label">Humidity</div>
    <div class="ring-wrap">
      <svg viewBox="0 0 90 90">
        <circle class="ring-bg" cx="45" cy="45" r="38"/>
        <circle class="ring-fill" id="ring-hum" cx="45" cy="45" r="38"
          stroke="#4caf50"
          stroke-dasharray="238.76"
          stroke-dashoffset="238.76"/>
      </svg>
      <div class="ring-label">
        <div class="ring-val" id="val-hum">--</div>
        <div class="ring-unit">% RH</div>
      </div>
    </div>
  </div>

  <!-- Gas -->
  <div class="card" id="card-gas">
    <div class="icon">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#FF8C00" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
        <path d="M12 2c0 0-7 6.5-7 12a7 7 0 0 0 14 0C19 8.5 12 2 12 2z"/>
        <path d="M12 12c0 0-3 2.5-3 5a3 3 0 0 0 6 0C15 14.5 12 12 12 12z" fill="rgba(255,140,0,0.3)"/>
      </svg>
    </div>
    <div class="label">Gas Level</div>
    <div class="ring-wrap">
      <svg viewBox="0 0 90 90">
        <circle class="ring-bg" cx="45" cy="45" r="38"/>
        <circle class="ring-fill" id="ring-gas" cx="45" cy="45" r="38"
          stroke="#FF8C00"
          stroke-dasharray="238.76"
          stroke-dashoffset="238.76"/>
      </svg>
      <div class="ring-label">
        <div class="ring-val" id="val-gas" style="font-size:1rem">--</div>
        <div class="ring-unit">ADC</div>
      </div>
    </div>
  </div>

  <!-- Motion -->
  <div class="card" id="card-motion">
    <div class="icon">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#ab47bc" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="3"/>
        <path d="M2 12C4.67 7.33 8 5 12 5s7.33 2.33 10 7c-2.67 4.67-6 7-10 7s-7.33-2.33-10-7z"/>
      </svg>
    </div>
    <div class="label">Motion</div>
    <div class="motion-val" id="val-motion">--</div>
    <div class="unit">PIR sensor</div>
  </div>
</main>

<!-- Chart -->
<div class="chart-wrap">
  <div class="chart-title">▶ Real-time Sensor Graph — Last 30 Seconds</div>
  <div class="chart-canvas-wrap">
    <canvas id="liveChart"></canvas>
  </div>
</div>

<footer id="last-updated">Last updated: --</footer>

<script>
// ── CONFIG ── change this one line on presentation day ──────────────────────
const PI_IP_ADDRESS = "192.168.1.100";
// ────────────────────────────────────────────────────────────────────────────

const BACKEND_URL = `http://${PI_IP_ADDRESS}:5000/api/data`;
const POLL_MS     = 1000;
const MAX_POINTS  = 30;

// ── ELEMENTS ────────────────────────────────────────────────────────────────
const $ = id => document.getElementById(id);
const els = {
  temp:   $("val-temp"),   hum:    $("val-hum"),
  gas:    $("val-gas"),    motion: $("val-motion"),
  banner: $("banner"),     dot:    $("conn-dot"),
  label:  $("conn-label"), footer: $("last-updated"),
  rTemp:  $("ring-temp"),  rHum:   $("ring-hum"),
  rGas:   $("ring-gas"),
};

// ── RING HELPER ──────────────────────────────────────────────────────────────
const CIRC = 238.76; // 2 * π * 38
function setRing(el, pct) {
  const offset = CIRC - Math.min(Math.max(pct, 0), 1) * CIRC;
  el.style.strokeDashoffset = offset.toFixed(2);
}

// ── CHART SETUP ──────────────────────────────────────────────────────────────
const labels   = Array(MAX_POINTS).fill("");
const tempData = Array(MAX_POINTS).fill(null);
const gasData  = Array(MAX_POINTS).fill(null);

const chart = new Chart($("liveChart"), {
  type: "line",
  data: {
    labels,
    datasets: [
      {
        label: "Temp (°C)",
        data: tempData,
        borderColor: "#45F3FF",
        backgroundColor: "rgba(69,243,255,0.06)",
        borderWidth: 1.5,
        pointRadius: 0,
        tension: 0.4,
        fill: true,
        yAxisID: "yTemp",
      },
      {
        label: "Gas (ADC)",
        data: gasData,
        borderColor: "#FF8C00",
        backgroundColor: "rgba(255,140,0,0.06)",
        borderWidth: 1.5,
        pointRadius: 0,
        tension: 0.4,
        fill: true,
        yAxisID: "yGas",
      },
    ],
  },
  options: {
    responsive: true,
    maintainAspectRatio: false,
    animation: false,          // off — keeps Pi CPU low
    interaction: { mode: "none" },
    plugins: {
      legend: {
        labels: {
          color: "#888",
          font: { size: 10 },
          boxWidth: 12,
        },
      },
      tooltip: { enabled: false },
    },
    scales: {
      x: {
        ticks: { display: false },
        grid:  { color: "rgba(255,255,255,0.05)" },
        border:{ color: "rgba(255,255,255,0.08)" },
      },
      yTemp: {
        type: "linear",
        position: "left",
        ticks: { color: "#45F3FF", font: { size: 9 }, maxTicksLimit: 5 },
        grid:  { color: "rgba(255,255,255,0.05)" },
        border:{ color: "rgba(255,255,255,0.08)" },
      },
      yGas: {
        type: "linear",
        position: "right",
        ticks: { color: "#FF8C00", font: { size: 9 }, maxTicksLimit: 5 },
        grid:  { drawOnChartArea: false },
        border:{ color: "rgba(255,255,255,0.08)" },
      },
    },
  },
});

// ── CHART ALARM THEME ────────────────────────────────────────────────────────
function setChartAlarm(on) {
  const gridColor = on ? "rgba(244,67,54,0.15)" : "rgba(255,255,255,0.05)";
  chart.options.scales.x.grid.color     = gridColor;
  chart.options.scales.yTemp.grid.color = gridColor;
  chart.update("none");
}

// ── PUSH NEW POINT ────────────────────────────────────────────────────────────
function pushPoint(temp, gas) {
  tempData.push(temp);  tempData.shift();
  gasData.push(gas);    gasData.shift();
  chart.update("none");
}

// ── STATE HELPERS ─────────────────────────────────────────────────────────────
function setConnected() {
  els.dot.className      = "live";
  els.dot.style.background  = "";
  els.label.style.color  = "#45F3FF";
  els.label.textContent  = "LIVE";
}
function setDisconnected() {
  els.dot.className      = "dead";
  els.label.style.color  = "#f44336";
  els.label.textContent  = "OFFLINE";
}
function showBanner(type, text) {
  els.banner.className   = type;
  els.banner.textContent = text;
}
function hideBanner() {
  els.banner.className   = "";
  els.banner.textContent = "";
}
function applyAlarm(on) {
  if (on) {
    document.body.classList.add("alarm");
    showBanner("alarm", "⚠️  EMERGENCY ALARM TRIGGERED  ⚠️");
    setChartAlarm(true);
  } else {
    document.body.classList.remove("alarm");
    hideBanner();
    setChartAlarm(false);
  }
}

// ── POLL ──────────────────────────────────────────────────────────────────────
function tick() {
  fetch(BACKEND_URL)
    .then(r => { if (!r.ok) throw new Error(r.status); return r.json(); })
    .then(d => {
      setConnected();
      applyAlarm(d.alarm === true);

      const temp = typeof d.temperature === "number" ? d.temperature : null;
      const hum  = typeof d.humidity    === "number" ? d.humidity    : null;
      const gas  = typeof d.gas_level   === "number" ? d.gas_level   : null;

      // text values
      els.temp.textContent   = temp !== null ? temp.toFixed(1) : "--";
      els.hum.textContent    = hum  !== null ? hum.toFixed(1)  : "--";
      els.gas.textContent    = gas  !== null ? gas              : "--";
      els.motion.textContent = d.motion === true  ? "DETECTED"
                             : d.motion === false ? "CLEAR" : "--";

      // rings (temp: 0–50, hum: 0–100, gas: 0–32767)
      if (temp !== null) setRing(els.rTemp, temp / 50);
      if (hum  !== null) setRing(els.rHum,  hum  / 100);
      if (gas  !== null) setRing(els.rGas,  gas  / 32767);

      // chart
      pushPoint(temp, gas);

      const now = new Date();
      els.footer.textContent = "Last updated: " +
        now.toLocaleTimeString([], { hour: "2-digit", minute: "2-digit", second: "2-digit" });
    })
    .catch(() => {
      setDisconnected();
      document.body.classList.remove("alarm");
      setChartAlarm(false);
      showBanner("error", "❌  Connection to SentinelPi lost — Reconnecting…");

      els.temp.textContent   = "--";
      els.hum.textContent    = "--";
      els.gas.textContent    = "--";
      els.motion.textContent = "DISCONNECTED";

      // push nulls so chart gaps rather than freezes
      pushPoint(null, null);
    });
}

tick();
setInterval(tick, POLL_MS);
</script>
</body>
</html>
